// Top-level build file

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP 9.1.1 → 8.7.2
        // Sebebi: @capacitor-mlkit/translation plugininin kendi build.gradle'i
        // AGP 8.7.2 kullanıyor. 9.x ile subproject çakışması oluyor.
        classpath 'com.android.tools.build:gradle:8.7.2'
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
